<div class="w-64 h-screen bg-[#FAFAFA] text-slate-700 flex flex-col p-4">

  <!-- LOGO -->
  <div class="flex items-center gap-3 mb-6">
    <img src="assets/NewLogo.png" alt="EquiMatrix Logo" class="h-14 object-contain" />
  </div>

  <!-- USER INFO -->
  <div
    class="flex items-center gap-3 px-4 py-3 mb-6 rounded-xl bg-slate-100 cursor-pointer hover:bg-slate-200 transition">
    <!-- Avatar -->
    <div class="h-9 w-9 rounded-full bg-green-500 text-white flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 
             3.75 3.75 0 017.5 0zM4.5 
             20.25a8.25 8.25 0 0116.5 0" />
      </svg>
    </div>

    <!-- Name -->
    <div class="text-sm font-medium text-slate-700">
      Admin
    </div>
  </div>

  <!-- MENU -->
  <nav class="flex flex-col gap-3 text-sm">

    <!-- DASHBOARD -->
    <a routerLink="/admin" routerLinkActive="text-[#22C55E]" [routerLinkActiveOptions]="{ exact: true }"
      #rlaDashboard="routerLinkActive" class="flex items-center justify-between px-4 py-2 rounded-xl group" [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaDashboard.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaDashboard.isActive
      }">
      <span class="font-medium">Dashboard</span>
    </a>

    <!-- EMPLOYEES -->
    <a routerLink="/admin/employees" routerLinkActive="text-[#22C55E]" #rlaUsers="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group" [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaUsers.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaUsers.isActive
      }">
      <span class="font-medium">Employees</span>
    </a>

    <!-- AWARDS -->
    <a routerLink="/admin/awards" routerLinkActive="text-[#22C55E]" #rlaAwards="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group" [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaAwards.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaAwards.isActive
      }">
      <span class="font-medium">Awards</span>
    </a>

    <!-- EXERCISE -->
    <a routerLink="/admin/exercise" routerLinkActive="text-[#22C55E]" #rlaExercise="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group" [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaExercise.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaExercise.isActive
      }">
      <span class="font-medium">Exercise Requests</span>
    </a>

    <!-- REPORTS -->
    <a routerLink="/admin/reports" routerLinkActive="text-[#22C55E]" #rlaReports="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group" [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaReports.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaReports.isActive
      }">
      <span class="font-medium">Reports</span>
    </a>

    <!-- NOTIFICATIONS -->
    <a routerLink="/admin/notifications" routerLinkActive="text-[#22C55E]" #rlaNotif="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group" [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaNotif.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaNotif.isActive
      }">
      <span class="font-medium">Notifications</span>
    </a>

  </nav>

  <!-- LOGOUT BUTTON -->
  <div class="mt-auto">
    <button (click)="onLogout()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-medium py-2.5 rounded-lg transition">
      Logout
    </button>
  </div>

</div>
