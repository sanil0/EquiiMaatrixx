<div class="min-h-screen bg-gray-100 overflow-x-hidden">

  <!-- MOBILE TOP BAR -->
  <div class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
    <button (click)="toggleSidebar()" class="p-2 rounded-md text-slate-600 hover:bg-slate-100">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
    <img src="assets/NewLogo.png" alt="EquiMatrix Logo" class="h-8 object-contain" />
    <div class="w-10"></div> <!-- Spacer for centering -->
  </div>

  <!-- SIDEBAR -->
  <aside class="fixed top-0 left-0 h-screen w-64 z-30 transform lg:translate-x-0 transition-transform duration-300 ease-in-out"
         [ngClass]="{'-translate-x-full': !isSidebarOpen, 'translate-x-0': isSidebarOpen}">
    <app-employee-nav-bar (menuItemClick)="closeSidebar()"></app-employee-nav-bar>
  </aside>

  <!-- OVERLAY FOR MOBILE -->
  <div *ngIf="isSidebarOpen" class="lg:hidden fixed inset-0 z-20 bg-black bg-opacity-50" (click)="closeSidebar()"></div>

  <!-- MAIN CONTENT -->
  <div class="lg:ml-64 min-h-screen flex flex-col pt-16 lg:pt-0">
    <main class="flex-1 bg-gray-100 text-slate-800 p-4 lg:p-6 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- FOOTER -->
  <footer class="w-full bg-[#E9E9E9] relative z-50">
    <app-footer></app-footer>
  </footer>

</div>
