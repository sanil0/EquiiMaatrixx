<div class="min-h-screen w-full flex bg-gradient-to-br from-[#edf2ff] via-[#f8faff] to-[#eef3ff]">

  <div class="flex w-full flex-col lg:flex-row">

    <!-- LEFT SIDE -->

    <div class="w-full lg:w-1/2 p-6 lg:p-14 flex flex-col justify-center items-center text-center
bg-gradient-to-br from-[#EDF8F3] to-[#F3FBF8] min-h-[40vh] lg:min-h-screen
max-[768px]:pt-16">

      <h2 class="text-2xl lg:text-4xl font-semibold text-slate-800 mb-6 lg:mb-8">
        Welcome to EquiMatrix
      </h2>

      <p class="text-slate-600 text-base lg:text-lg leading-relaxed max-w-lg px-4">
        Manage and track equity awards, employee data, and organizational insights
        in one unified platform. Designed for administrators and employees
        to stay informed and in control.
      </p>
    </div>

    <!-- RIGHT SIDE (LOGIN) -->
    <div class="w-full lg:w-1/2 px-6 lg:px-20 flex flex-col justify-center bg-white min-h-[60vh] lg:min-h-screen">

      <!-- LOGO -->
      <div class="mb-6 lg:mb-10 absolute top-4 left-4 lg:top-6 lg:left-8">
        <img src="assets/NewLogo.png" alt="EquiMatrix Logo" class="h-8 lg:h-10 w-auto" />
      </div>

      <!-- <h2 class="text-xl lg:text-2xl font-semibold mb-6 lg:mb-8 text-slate-800 mt-12 lg:mt-0 max-[768px]:px-8 pt-4">
        Login to your Account
      </h2> -->

      <div *ngIf="warningMessage" class="mb-6 rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-800">
        <strong>Session expired:</strong> {{ warningMessage }}
      </div>
      <br>
      <form (ngSubmit)="onLogin()" class="space-y-6 max-w-md mx-auto lg:mx-0">
        <!-- TOGGLE SWITCH (BEST UI) -->
        <div class="flex bg-slate-100 rounded-lg p-1 w-max mb-6 shadow-sm mx-auto lg:mx-0">
         
          <button type="button" (click)="selectedRole = 'Employee'" [ngClass]="selectedRole === 'Employee'
    ? 'bg-white text-[#169873] shadow font-semibold'
    : 'text-slate-500'" class="px-4 lg:px-6 py-2 rounded-md transition text-sm">
            Employee
          </button>

          <button type="button" (click)="selectedRole = 'Admin'" [ngClass]="selectedRole === 'Admin'
    ? 'bg-white text-[#169873] shadow font-semibold'
    : 'text-slate-500'" class="px-4 lg:px-6 py-2 rounded-md transition text-sm">
            Admin
          </button>

        </div>

        <!-- Email -->
        <div>
          <label class="text-sm text-slate-600">Email</label>
          <input type="email" [(ngModel)]="email" name="email" class="w-full mt-2 px-4 py-3 rounded-lg
                   border border-slate-200
                   focus:outline-none focus:ring-2 focus:ring-[#5B6CFF]" required>
        </div>

        <!-- Password -->
        <div>
          <label class="text-sm text-slate-600">Password</label>
          <input type="password" [(ngModel)]="password" name="password" class="w-full mt-2 px-4 py-3 rounded-lg
                   border border-slate-200
                   focus:outline-none focus:ring-2 focus:ring-[#5B6CFF]" required>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center text-sm gap-2">
          <label class="flex items-center text-slate-600">
            <input type="checkbox" class="mr-2 rounded border-slate-300 text-[#5B6CFF] focus:ring-[#5B6CFF]">
            Remember me
          </label>

          <button type="button" (click)="openForgotPasswordModal()" *ngIf="selectedRole !== 'Admin'"
            class="text-[#003482] cursor-pointer hover:underline font-medium">
            Forgot password?
          </button>
        </div>

        <!-- Button -->
        <button class="w-full bg-[#169873] hover:bg-[#12865f]
                text-white py-2.5 rounded-lg font-semibold transition ">
          Login as {{ selectedRole || '...' }}
        </button>
        <br>
        <br>
      </form>

    </div>

  </div>
</div>

<!-- Forgot Password Modal -->
<app-forgot-password-modal #forgotPasswordModal></app-forgot-password-modal>
