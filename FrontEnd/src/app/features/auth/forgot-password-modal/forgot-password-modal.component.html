<!-- Modal Overlay -->
<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

  <!-- Modal Container -->
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md mx-4 p-6 relative">

    <!-- Close Button -->
    <button (click)="close()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600" aria-label="Close">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <!-- Modal Title -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Reset Password
    </h2>

    <!-- Error Message -->
    <div *ngIf="error" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
      {{ error }}
    </div>

    <!-- Success Message -->
    <div *ngIf="success" class="mb-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded">
      {{ success }}
    </div>

    <!-- STEP 1: Email Verification -->
    <div *ngIf="currentStep === 'email'">
      <p class="text-gray-600 text-sm mb-4">Enter your email address to receive an OTP</p>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-medium mb-2">Email Address</label>
        <input
          [(ngModel)]="email"
          type="email"
          placeholder="Enter your email"
          class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
        />
      </div>

      <button
        (click)="sendOtp()"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded transition duration-200"
      >
        {{ loading ? 'Sending...' : 'Send OTP' }}
      </button>
    </div>

    <!-- STEP 2: OTP Verification -->
    <div *ngIf="currentStep === 'otp'">
      <p class="text-gray-600 text-sm mb-4">Enter the 6-digit OTP sent to {{ email }}</p>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-medium mb-2">OTP Code</label>
        <input
          [(ngModel)]="otp"
          type="text"
          maxlength="6"
          placeholder="000000"
          class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-center text-2xl tracking-widest"
        />
      </div>

      <button
        (click)="verifyOtp()"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded transition duration-200 mb-2"
      >
        {{ loading ? 'Verifying...' : 'Verify OTP' }}
      </button>

      <button
        (click)="goBack()"
        [disabled]="loading"
        class="w-full bg-gray-300 hover:bg-gray-400 disabled:bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded transition duration-200"
      >
        Back
      </button>
    </div>

    <!-- STEP 3: Password Reset -->
    <div *ngIf="currentStep === 'password'">
      <p class="text-gray-600 text-sm mb-4">Create your new password</p>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-medium mb-2">New Password</label>
        <div class="relative">
          <input
            [(ngModel)]="newPassword"
            [type]="isPasswordVisible ? 'text' : 'password'"
            placeholder="Enter new password"
            class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
          />
          <button
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-3 text-gray-500 hover:text-gray-700"
            type="button"
          >
            <svg *ngIf="!isPasswordVisible" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
              </path>
            </svg>
            <svg *ngIf="isPasswordVisible" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
              </path>
            </svg>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-medium mb-2">Confirm Password</label>
        <div class="relative">
          <input
            [(ngModel)]="confirmPassword"
            [type]="isConfirmPasswordVisible ? 'text' : 'password'"
            placeholder="Confirm new password"
            class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
          />
          <button
            (click)="toggleConfirmPasswordVisibility()"
            class="absolute right-3 top-3 text-gray-500 hover:text-gray-700"
            type="button"
          >
            <svg *ngIf="!isConfirmPasswordVisible" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
              </path>
            </svg>
            <svg *ngIf="isConfirmPasswordVisible" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
              </path>
            </svg>
          </button>
        </div>
      </div>

      <p class="text-gray-500 text-xs mb-4">Password must be at least 8 characters long</p>

      <button
        (click)="resetPassword()"
        [disabled]="loading"
        class="w-full bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded transition duration-200 mb-2"
      >
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <button
        (click)="goBack()"
        [disabled]="loading"
        class="w-full bg-gray-300 hover:bg-gray-400 disabled:bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded transition duration-200"
      >
        Back
      </button>
    </div>

  </div>
</div>
