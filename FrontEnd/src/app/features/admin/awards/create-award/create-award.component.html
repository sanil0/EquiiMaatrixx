<div class="max-w-2xl mx-auto mt-8 bg-white p-8 rounded-xl shadow-sm">

  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-800">
      Create Award
    </h1>

    <a
      routerLink="/admin/awards"
      class="text-sm text-blue-600 hover:underline"
    >
      Back to Awards
    </a>
  </div>

  <form
    [formGroup]="awardForm"
    (ngSubmit)="submit()"
    class="space-y-5"
  >

    <!-- Employee ID -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Employee ID
      </label>
      <input
        formControlName="employeeId"
        class="w-full border rounded px-3 py-2 text-black"
      />
      <p
        *ngIf="
          awardForm.get('employeeId')?.invalid &&
          awardForm.get('employeeId')?.touched
        "
        class="text-sm text-red-600 mt-1"
      >
        Employee ID is required
      </p>
    </div>

    <!-- Grant Type -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Grant Type
      </label>
      <select
        formControlName="grantType"
        class="w-full border rounded px-3 py-2 bg-white text-black"
      >
        <option value="" disabled>Select grant type</option>
        <option *ngFor="let type of grantTypes()" [value]="type" class="text-gray-800">
          {{ type }}
        </option>
      </select>
    </div>

    <!-- Number of Shares -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Number of Shares
      </label>
      <input
        type="number"
        formControlName="numberOfShares"
        class="w-full border rounded px-3 py-2 text-black"
      />
    </div>

    <!-- Strike Price -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Strike Price
      </label>
      <input
        type="number"
        formControlName="strikePrice"
        class="w-full border rounded px-3 py-2 text-black"
      />
    </div>

    <!-- Vesting Period -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Vesting Period (Years)
      </label>
      <input
        formControlName="vestingPeriod"
        class="w-full border bg-gray-100 rounded px-3 py-2 text-gray-600"
      />
    </div>

    <!-- Grant Date -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Grant Date
      </label>
      <input
        type="date"
        formControlName="grantDate"
        class="w-full border rounded px-3 py-2 text-black"
      />
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3 pt-4">
      <a
        routerLink="/admin/awards"
        class="px-4 py-2 border rounded hover:bg-yellow-600 bg-yellow-500"
      >
        Cancel
      </a>
      <button
        type="submit"
        class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700"
      >
        Save Award
      </button>
    </div>

  </form>
</div>
